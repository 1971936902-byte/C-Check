x-backend-environment: &backend-environment
  DATABASE_URL: "mysql+pymysql://${MYSQL_USER:-c_check}:${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}@mysql:3306/${MYSQL_DATABASE:-c_check}"
  REDIS_URL: "redis://redis:6379/0"
  JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env}"
  JWT_EXPIRE_MINUTES: "${JWT_EXPIRE_MINUTES:-480}"
  ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
  ADMIN_PASSWORD: "${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}"
  UPLOAD_MAX_FILE_BYTES: "${UPLOAD_MAX_FILE_BYTES:-1048576}"
  UPLOAD_MAX_ARCHIVE_BYTES: "${UPLOAD_MAX_ARCHIVE_BYTES:-10485760}"
  UPLOAD_MAX_EXTRACTED_BYTES: "${UPLOAD_MAX_EXTRACTED_BYTES:-10485760}"
  UPLOAD_MAX_FILES: "${UPLOAD_MAX_FILES:-200}"
  UPLOAD_MAX_ARCHIVE_ENTRIES: "${UPLOAD_MAX_ARCHIVE_ENTRIES:-1000}"
  UPLOAD_MAX_PATH_LENGTH: "${UPLOAD_MAX_PATH_LENGTH:-512}"
  CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost"]}'
  STORAGE_PATH: "/data/uploads"
  MOCK_MODEL_ENABLED: "${MOCK_MODEL_ENABLED:-false}"
  ALLOW_INSECURE_DEFAULTS: "${ALLOW_INSECURE_DEFAULTS:-false}"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-c_check}"
      MYSQL_USER: "${MYSQL_USER:-c_check}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment: *backend-environment
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=INFO"]
    environment: *backend-environment
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A app.worker.celery_app inspect ping --destination celery@$$HOSTNAME --timeout 5 | grep -q pong",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  redis_data:
  uploads_data:
